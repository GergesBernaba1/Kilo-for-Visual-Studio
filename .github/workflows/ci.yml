name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore "Kilo.VisualStudio.slnx"

      - name: Build
        run: dotnet build "Kilo.VisualStudio.slnx" --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test "Kilo.VisualStudio.Tests\Kilo.VisualStudio.Tests.csproj" --no-build --configuration Release

      - name: Run CLI tests
        run: |
          dotnet run --project "Kilo.VisualStudio.Cli\Kilo.VisualStudio.Cli.csproj" -- status --json

